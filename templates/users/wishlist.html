{% extends "base.html" %}
{% block content %}

<div class="container my-4">
    <div class="d-flex justify-content-between align-items-end mb-4">
        <div>
            <h2 class="section-title mb-1">Wishlist</h2>
            <p class="text-muted mb-0">Saved properties will appear here.</p>
        </div>
        <a class="btn btn-outline-secondary btn-sm" href="{% url 'property_list' %}">Explore</a>
    </div>

    <div class="card p-4 text-center">
        <div class="mb-3" aria-hidden="true" style="font-size: 3rem; color: var(--gray-400);">
            <i class="far fa-heart"></i>
        </div>
        <h4 class="mb-2">No saved properties</h4>
        <p class="text-muted mb-3">Save listings to compare them later.</p>
        <a class="btn btn-primary" href="{% url 'property_list' %}">Start browsing</a>
    </div>
</div>

{% endblock %}
